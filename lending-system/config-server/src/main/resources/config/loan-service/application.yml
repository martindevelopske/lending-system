server:
  port: 8083

spring:
  application:
    name: loan-service
  datasource:
    url: jdbc:postgresql://localhost:5435/loan_db
    username: lending
    password: lending
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
  rabbitmq:
    host: localhost
    port: 5672
    username: lending
    password: lending

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

loan:
  write-off:
    days-threshold: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info
